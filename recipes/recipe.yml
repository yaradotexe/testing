# Project Icarus - Main Image Recipe
# Based on Bazzite KDE 

name: project-icarus
description: Optimized Fedora-based gaming and workstation image
base-image: ghcr.io/ublue-os/bazzite
image-version: latest

modules:
  - type: rpm-ostree
    install:
      - gum
      - yad
      - zenity
      - retroarch
      - plymouth-theme-spinner
  
  - type: files
    files:
      - source: system/usr
        destination: /usr
      - source: systemd/icarus-user-rename.service
        destination: /etc/systemd/system/icarus-user-rename.service
      - source: modules/plymouth/win98
        destination: /usr/share/icarus/plymouth
      - source: ascii.txt
        destination: /usr/share/icarus/ascii.txt
      - source: modules/reactionary
        destination: /etc/skel

  - type: script
    scripts:
      - setup-plymouth.sh
      - setup-ui-theme.sh
      - finalize-system.sh

